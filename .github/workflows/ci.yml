name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-bundle:
    name: Bundle structural verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install hashing + PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils libimage-exiftool-perl poppler-utils

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run verify-install (offline — no npm reachability)
        run: ./scripts/verify-install.sh --offline

      - name: Run verify-install (online — npm reachability)
        run: ./scripts/verify-install.sh
        continue-on-error: true  # warn-only; transient npm 404s shouldn't break CI

  shellcheck:
    name: Shellcheck scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts
          severity: warning

  json-lint:
    name: JSON files parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate every .json
        run: |
          set -e
          for f in $(git ls-files '*.json'); do
            echo "checking $f"
            python -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done

  markdown-frontmatter:
    name: Command + agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Every command and agent declares description
        run: |
          python - <<'PY'
          import pathlib, re, sys
          errs = []
          for d in (".claude/commands", ".claude/agents"):
              for p in sorted(pathlib.Path(d).glob("*.md")):
                  text = p.read_text()
                  # accept either YAML frontmatter (---\n...\n---) or top-level
                  # `description:` / `name:` keys near the top of the file
                  head = "\n".join(text.splitlines()[:30])
                  if "description" not in head:
                      errs.append(f"{p}: missing description in first 30 lines")
          if errs:
              for e in errs: print(e)
              sys.exit(1)
          print("All command + agent files declare description.")
          PY

  ai-extension-build:
    name: ai-extension TypeScript build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-extension/package-lock.json
      - run: npm install
      - run: npx tsc --noEmit
